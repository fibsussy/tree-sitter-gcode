name: Build Parser

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build parser
        run: |
          make clean
          make
        
      - name: Upload parser.so
        uses: actions/upload-artifact@v4
        with:
          name: parser-linux
          path: libtree-sitter-gcode.so